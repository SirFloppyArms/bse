<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BSE favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff" />
      <stop offset="1" stop-color="#dce8f2" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a8aa2" />
      <stop offset="1" stop-color="#2f526c" />
    </linearGradient>
    <clipPath id="logo-area">
      <rect x="9" y="12" width="46" height="40" rx="8" />
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <rect x="4" y="4" width="56" height="56" rx="12" fill="none" stroke="url(#ring)" stroke-width="2" />

  <g clip-path="url(#logo-area)">
    <rect x="9" y="12" width="46" height="40" rx="8" fill="#ffffff" />
    <image href="./assets/logo.png" x="9" y="14" width="46" height="36" preserveAspectRatio="xMidYMid meet" opacity="0.95" />
  </g>

  <rect x="9" y="12" width="46" height="40" rx="8" fill="none" stroke="#b8c7d4" stroke-width="1" />
</svg>
